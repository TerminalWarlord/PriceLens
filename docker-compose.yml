# https://www.meilisearch.com/docs/resources/self_hosting/getting_started/docker
services:
  meilisearch:
    image: "getmeili/meilisearch:latest"
    ports:
      - "7700:7700"
    volumes:
      - ./meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    restart: unless-stopped
